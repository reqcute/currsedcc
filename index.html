<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your IP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b111f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.ip {
    font-size: 28px;
    font-weight: bold;
    color: #4da6ff;
}

/* Hidden admin button */
#adminBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.2);
    font-size: 14px;
    cursor: pointer;
}

#adminBtn:hover {
    color: rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<!-- Admin button -->
<button id="adminBtn" onclick="goToLogin()">⚙</button>

<div class="container">
    <h1>Your IP Address</h1>
    <div class="ip" id="ip">Loading...</div>
</div>

<script>
// Show user's IP
fetch("https://api.ipify.org?format=json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("ip").textContent = data.ip;
    });

// Log visit
fetch("/api/log", { method: "POST" });

// Redirect to login page
function goToLogin() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
